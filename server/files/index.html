<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
            background-color: black;
            color: black;
            max-width: 800px;
            margin: 0 auto; 
            padding: 20px;
        }

        .movie-card {
            background-color: white;
            margin-bottom: 30px;
            padding: 20px;
                }

        .movie-card h2 {
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 5px;
        }

        .movie-body {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .movie-poster {
            border-radius: 8px;
            max-width: 180px;
            height: auto;
            transition: transform 1s ease-in-out; 
        }

        
        .movie-poster:hover {
            transform: rotate(360deg);
        }

        span.genre {
            background-color: white;
            padding: 4px 8px;
            border-radius: 12px;
            margin-right: 5px;
            display: inline-block;
            border: 1px solid red;
        }

        blockquote {
            font-style: normal;
            border-left: 3px solid red;
            padding-left: 10px;
            margin: 15px 0;
        }

        ul li {
            margin-bottom: 5px;
        }


    </style>

    <script>
        window.onload = function () {
            const xhr = new XMLHttpRequest();
            xhr.onload = function () {
                const bodyElement = document.querySelector("body");
                
                if (xhr.status == 200) {
                    const movies = JSON.parse(xhr.responseText);
                    
                    movies.forEach(movie => {
                        const article = document.createElement("article");
                        article.className = "movie-card";

                        const header = document.createElement("header");
                        const title = document.createElement("h1");
                        title.textContent = movie.Title;
                        
                        const ratings = document.createElement("p");
                        ratings.className = "ratings";
                        ratings.innerHTML = `<strong>IMDb:</strong> ${movie.imdbRating} | <strong>Metascore:</strong> ${movie.Metascore}`;
                        
                        header.append(title, ratings);

                        const mainContent = document.createElement("div");
                        mainContent.className = "movie-body";

                        const poster = document.createElement("img");
                        poster.src = movie.Poster;
                        poster.alt = `Poster for ${movie.Title}`;
                        poster.className = "movie-poster";

                        const infoDiv = document.createElement("div");
                        infoDiv.className = "movie-info";

                        const hours = Math.floor(movie.Runtime / 60);
                        const mins = movie.Runtime % 60;
                        

                        let genreTags = ""; 
                        for (let i = 0; i < movie.Genres.length; i++) {
                            genreTags += '<span class="genre">' + movie.Genres[i] + '</span>';
                        }

                        const meta = document.createElement("p");
                        meta.innerHTML = `${movie.Released} &nbsp;|&nbsp; ${hours}h ${mins}m <br><br> ${genreTags}`;

                        const plot = document.createElement("blockquote");
                        plot.textContent = movie.Plot;

                        const crewList = document.createElement("ul");
                        crewList.innerHTML = `
                            <li><strong>Director(s):</strong> ${movie.Directors.join(", ")}</li>
                            <li><strong>Writer(s):</strong> ${movie.Writers.join(", ")}</li>
                            <li><strong>Actors:</strong> ${movie.Actors.join(", ")}</li>
                        `;

                        infoDiv.append(meta, plot, crewList);
                        mainContent.append(poster, infoDiv);
                        
                        article.append(header, mainContent);

                        bodyElement.append(article);
                    });

                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status);
                }
            };
            xhr.open("GET", "/movies");
            xhr.send();
        };
    </script>
</head>

<body>
</body>

</html>
